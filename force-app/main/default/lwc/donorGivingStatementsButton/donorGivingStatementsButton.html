<!-- Donor Giving Statements Button -->
<template>
    <lightning-button
            label="Giving Statements Report"
            class="giving-statements-report-button"
            variant="brand"
            onclick={handleOpenModal}
    ></lightning-button>
    <div class="slds-container_medium" if:true={enableModal}>
        <section
                role="dialog"
                tabindex="-1"
                aria-modal="true"
                class="slds-modal slds-fade-in-open"
        >
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium slds-hyphenate">Donor Giving Statements</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium custom-content slds-is-relative">
                    <div class="slds-grid_vertical">
                        <div>
                            <span>Please pick a date range for donor statements</span>
                        </div>
                        <div>
                            <lightning-input
                                    name="fromDate"
                                    label="From"
                                    type="date"
                                    onchange={handleChangeInput}
                            ></lightning-input>
                            <lightning-input
                                    name="toDate"
                                    label="To"
                                    type="date"
                                    onchange={handleChangeInput}
                            ></lightning-input>
                        </div>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <button
                            class="slds-button slds-button_outline-brand"
                            name="cancel"
                            onclick={handleCloseModal}
                    >Close</button>
                    <button
                            class="slds-button slds-button_brand"
                            disabled={disableOpenButton}
                            onclick={handleOpenPDF}
                    >Open</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </div>
</template>
