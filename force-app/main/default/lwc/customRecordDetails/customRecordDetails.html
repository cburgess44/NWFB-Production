<template>
    <lightning-card>
        <template if:false={doNotShow}>
            <lightning-card>
                <lightning-datatable
                    record-id={recordId}
                    key-field="Id"
                    data={records}
                    columns={recordFields}
                    hide-checkbox-column="true">
                </lightning-datatable>
            </lightning-card>
        </template>

        <template if:true={doNotShow}>
            <div class="slds-border_bottom slds-align_absolute-center">NO FEE FOUND</div>
        </template>
    </lightning-card>
</template>
