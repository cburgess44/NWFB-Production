<!-- Clover Connect Usage Examples -->
<template>

    <div class="slds-box slds-theme_default slds-is-relative">


        <lightning-accordion active-section-name="section0" >

            <lightning-accordion-section name="section0" label="Simple payment form">

                <div class="code-snippet slds-grid slds-grid_vertical-align-center slds-m-vertical_medium">
                    <pre><code>{codeExamples.simpleForm}</code></pre>
                </div>

                <c-clover-connect-payment-form
                        payment-type="card"
                        enable-comments="true"
                ></c-clover-connect-payment-form>

            </lightning-accordion-section>

            <lightning-accordion-section name="section1" label="Payment Form with all options enabled">

                <div class="code-snippet slds-grid slds-grid_vertical-align-center slds-m-vertical_medium">
                    <pre><code>{codeExamples.formWithAllOptions}</code></pre>
                </div>

                <c-clover-connect-payment-form
                        enable-email-capture="true"
                        enable-scheduling-plan="all"
                        enable-anonymous="true"
                        enable-comments="true"
                        user-fields={userFieldsExample}
                ></c-clover-connect-payment-form>

            </lightning-accordion-section>

            <lightning-accordion-section name="section2" label="Manage Payment Accounts Component">

                <div class="code-snippet slds-grid slds-grid_vertical-align-center slds-m-vertical_medium">
                    <pre><code>{codeExamples.manageAccounts}</code></pre>
                </div>

                <c-clover-connect-profile-manager
                        profile-id="15309722213283839773"
                ></c-clover-connect-profile-manager>

            </lightning-accordion-section>

            <lightning-accordion-section name="section3" label="Payment Form with Saved Accounts">

                <div class="code-snippet slds-grid slds-grid_vertical-align-center slds-m-vertical_medium">
                    <pre><code>{codeExamples.formWithSavedAccounts}</code></pre>
                </div>

                <c-clover-connect-payment-form
                        profile-id="15309722213283839773"
                        enable-anonymous="true"
                        enable-save-for-future="true"
                        enable-comments="true"
                ></c-clover-connect-payment-form>

            </lightning-accordion-section>

            <lightning-accordion-section name="section4" label="Payment Form with Locked Amount">

                <div class="code-snippet slds-grid slds-grid_vertical-align-center slds-m-vertical_medium">
                    <pre><code>{codeExamples.lockedAmountForm}</code></pre>
                </div>

                <c-clover-connect-payment-form
                        payment-type="card"
                        locked-amount="10"
                ></c-clover-connect-payment-form>

            </lightning-accordion-section>

        </lightning-accordion>

    </div>

</template>
