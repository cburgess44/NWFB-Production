<template>
    <div class="slds-container_large">
        <section
                role="dialog"
                tabindex="-1"
                aria-modal="true"
                class="slds-modal slds-fade-in-open"
        >
            <div class="slds-modal__container modal-box ">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium slds-hyphenate">Reply Message</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium custom-content slds-is-relative">
                    <lightning-spinner size="small" if:true={loading}></lightning-spinner>
                    <lightning-textarea
                            label="Message"
                            max-length="150"
                            value={message}
                            onchange={handleChangeMessageInput}
                    ></lightning-textarea>
                    <div class="slds-text-align_left">{message.length}/150</div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button
                            variant="brand-outline"
                            label="Cancel"
                            class="slds-m-right_small"
                            onclick={handleCloseModal}
                    ></lightning-button>
                    <lightning-button
                            variant="brand"
                            label="Reply"
                            onclick={handleReplyMessage}
                    ></lightning-button>
                </footer>
            </div>
        </section>
    </div>
</template>
