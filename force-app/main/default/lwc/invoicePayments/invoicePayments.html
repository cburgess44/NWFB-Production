<template>
    <lightning-spinner if:true={loading}></lightning-spinner>
    <template if:true={showData}>

        <!-- Payment Form -->
        <div class="payment-box slds-m-bottom_medium">
            <div class="payment-box-header">
                Payment Form
            </div>

            <div class="payment-box-content">
                <div class="payment-fields-row">
                    <div class="payment-field">
                        <lightning-input
                                name="PaymentDate__c"
                                type="date"
                                required=true
                                label="Payment Date"
                                value={parentPayment.PaymentDate__c}
                                onchange={handlePaymentDataChange}
                        ></lightning-input>
                    </div>

                    <div class="payment-field">
                        <lightning-radio-group
                                name="PaymentMethod__c"
                                label="Payment Method"
                                options={methodOptions}
                                value={parentPayment.PaymentMethod__c}
                                onchange={handlePaymentDataChange}
                                type="button"
                        ></lightning-radio-group>
                    </div>

                    <template if:false={showCardForm}>
                        <div class="payment-field">
                            <lightning-input
                                    name="CheckNumber__c"
                                    label="Check Number"
                                    value={parentPayment.CheckNumber__c}
                                    onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <div class="payment-field-amount">
                            <lightning-input
                                    name="PaymentAmount__c"
                                    label="Total Payment"
                                    value={parentPayment.PaymentAmount__c}
                                    type="number"
                                    formatter="currency"
                                    step="0.01"
                                    readonly
                            ></lightning-input>
                        </div>
                    </template>
                </div>

                <template if:true={showNoInvoiceMessage}>
                    <p class="payment-message"><lightning-formatted-text value={label.NoInvoiceLabel}></lightning-formatted-text></p>
                </template>

                <template if:true={showCardForm}>
                    <c-clover-connect-payment-form
                            payment-type="card"
                            locked-amount={parentPayment.PaymentAmount__c}
                            user-fields={userFields}
                            onaftersubmit={handleAfterSubmit}
                    ></c-clover-connect-payment-form>
                </template>

                <div class="button-row" if:false={showCardForm}>
                    <lightning-button
                            disabled={disableCheckForm}
                            variant="brand"
                            label="Pay Now"
                            onclick={handleSubmitPayment}
                    ></lightning-button>
                </div>
            </div>
        </div>

        <!-- Services/Invoices Table -->
        <lightning-card title={cardTitle}>
            <div class="slds-card__body_inner">
                <lightning-datatable
                        key-field="Id"
                        data={invoices}
                        selected-rows={selectedRows}
                        columns={data}
                        onrowselection={handleRowSelection}
                        oncellchange={handleCellChange}
                        draft-values={draftValues}
                        suppress-bottom-bar="true"
                ></lightning-datatable>
            </div>

        </lightning-card>
    </template>
</template>
